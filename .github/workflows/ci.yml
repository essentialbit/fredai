name: FredAI CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'   # R&D discovery + implementation every 6h
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        default: 'ci'
        type: choice
        options: [ci, improve, discover, dry-run]

jobs:
  # ── CI: validate on every push ──────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - run: pip install -r requirements.txt -q
      - name: Import check
        run: |
          python3 -c "
          import os; os.environ['ANTHROPIC_API_KEY']='test'
          from config import *
          from memory_store import init_db, insert_feature_proposal, get_top_proposals
          from market_data import fetch_quotes
          from trend_detector import compute_sentiment_stats
          from twitter_client import score_text
          init_db()
          s, t = score_text('NVDA crushing earnings — massive bull signal')
          assert t in ('bullish','bearish','neutral')
          insert_feature_proposal('Test Feature', 'Test', 'general')
          props = get_top_proposals(limit=1)
          assert len(props) > 0
          print(f'All imports OK | VADER: {s:.3f}/{t}')
          "
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'skip' }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN || 'skip' }}
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY || 'skip' }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET || 'skip' }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN || 'skip' }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET || 'skip' }}

  # ── Docker build check ───────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t fredai:${{ github.sha }} .
      - name: Log in to GHCR
        if: success()
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to GHCR
        if: success()
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/fredai
          docker tag fredai:${{ github.sha }} $IMAGE:latest
          docker tag fredai:${{ github.sha }} $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}

  # ── Deploy: notify registered instances ─────────────────────────
  deploy:
    name: Deploy to Instances
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Notify instances to update
        # Each instance registers its /api/update/apply endpoint via
        # the FREDAI_WEBHOOK_URLS secret (comma-separated URLs).
        # Instances must have AUTO_UPDATE=auto or manually apply.
        run: |
          URLS="${{ secrets.FREDAI_WEBHOOK_URLS }}"
          if [ -z "$URLS" ]; then
            echo "No FREDAI_WEBHOOK_URLS configured — skipping instance notification"
            exit 0
          fi
          SHA="${{ github.sha }}"
          IFS=',' read -ra ADDRS <<< "$URLS"
          for URL in "${ADDRS[@]}"; do
            URL=$(echo "$URL" | xargs)  # trim whitespace
            echo "Notifying: $URL"
            curl -sS -X POST "$URL/api/update/apply" \
              -H "Content-Type: application/json" \
              -H "X-FredAI-Deploy: $SHA" \
              --max-time 30 \
              --fail-with-body || echo "  Warning: $URL did not respond"
          done

  # ── R&D: every 6h ───────────────────────────────────────────────
  rnd:
    name: R&D Improvement Cycle
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'ci')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - run: pip install -r requirements.txt -q
      - name: Run improvement cycle
        run: |
          MODE="${{ github.event.inputs.mode || 'improve' }}"
          if [ "$MODE" = "dry-run" ]; then
            python3 improve.py --dry-run
          elif [ "$MODE" = "discover" ]; then
            python3 improve.py --discover
          else
            python3 improve.py
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      - name: Commit improvements
        run: |
          git config user.name "FredAI"
          git config user.email "fredai-bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || \
            git commit -m "auto-improve: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin main || true

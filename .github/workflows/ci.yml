name: FredAI CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"   # R&D + community cycle every 6h
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        default: ci
        type: choice
        options: [ci, improve, discover, dry-run, release]
      release_version:
        description: "Version for manual release (e.g. v1.2.0) — only when mode=release"
        required: false

jobs:
  # ── Validate on every push / PR ────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt -q
      - name: Import check
        run: |
          python3 -c "
          import os; os.environ['ANTHROPIC_API_KEY']='test'
          from config import *
          from memory_store import init_db, insert_feature_proposal, get_top_proposals
          from market_data import fetch_quotes
          from trend_detector import compute_sentiment_stats
          from twitter_client import score_text
          from installer import detect_device, is_installed
          from updater import status
          from community import run_community_cycle
          init_db()
          s, t = score_text('NVDA crushing earnings — massive bull signal')
          assert t in ('bullish','bearish','neutral')
          insert_feature_proposal('Test Feature', 'Test', 'general')
          props = get_top_proposals(limit=1)
          assert len(props) > 0
          print(f'All imports OK | VADER: {s:.3f}/{t}')
          "
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'skip' }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN || 'skip' }}
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY || 'skip' }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET || 'skip' }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN || 'skip' }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET || 'skip' }}
      - name: Set metadata
        id: meta
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  # ── Docker build + push to GHCR ────────────────────────────────
  docker:
    name: Docker Build and Push
    needs: validate
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'release')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine image tags
        id: tags
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/fredai"
          SHORT="${{ needs.validate.outputs.short_sha }}"
          TAGS="$IMAGE:latest,$IMAGE:$SHORT"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="$TAGS,$IMAGE:$VERSION"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
      - name: "Build and push (amd64 + arm64)"
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Auto-tag every push to main ────────────────────────────────
  auto-tag:
    name: Auto-version
    needs: [validate, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Bump patch version and tag
        id: bump
        run: |
          git config user.name "FredAI"
          git config user.email "fredai-bot@users.noreply.github.com"
          LATEST=$(git tag --list 'v*' --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "v0.0.0")
          MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d v)
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH+1))"
          echo "Previous: $LATEST → New: $NEW_TAG"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

  # ── GitHub Release ───────────────────────────────────────────────
  # auto-tag's tag push uses the default GITHUB_TOKEN, which GitHub
  # deliberately excludes from triggering downstream workflow runs (an
  # anti-recursion safeguard) -- so this job's original
  # startsWith(github.ref, 'refs/tags/v') condition could never actually
  # be satisfied via the automated path; it only ever fired via manual
  # workflow_dispatch. Confirmed live: tags advanced to v1.3.51 while the
  # last real Release stayed at v1.3.18. Fixed by reading auto-tag's
  # new_tag *output* directly (same workflow run, no separate trigger
  # needed) instead of depending on a second run whose ref is the tag.
  release:
    name: GitHub Release
    needs: [validate, docker, auto-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: |
      needs.auto-tag.outputs.new_tag != '' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'release')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ needs.auto-tag.outputs.new_tag }}" ]]; then
            VERSION="${{ needs.auto-tag.outputs.new_tag }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ github.event.inputs.release_version }}" ]]; then
            VERSION="${{ github.event.inputs.release_version }}"
          else
            VERSION="v$(date -u +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null \
            || git rev-list --max-parents=0 HEAD)
          CHANGES=$(git log "$LAST_TAG..HEAD" --pretty=format:"- %s" \
            --no-merges | grep -v '^- auto-improve' | head -40)
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "FredAI ${{ steps.version.outputs.version }}"
          body: |
            ## FredAI ${{ steps.version.outputs.version }}

            ### Changes
            ${{ steps.changelog.outputs.changes }}

            ### Install / update

            **Docker (any platform):**
            ```bash
            docker pull ghcr.io/essentialbit/fredai:${{ steps.version.outputs.version }}
            # or always-latest:
            docker pull ghcr.io/essentialbit/fredai:latest
            docker compose pull && docker compose up -d
            ```

            **Native (macOS / Linux / Pi):**
            ```bash
            git pull origin main
            pip install -r requirements.txt
            python3 main.py
            ```

            **Auto-update:** instances with `AUTO_UPDATE=auto` apply this automatically within 6 hours.

            ---
            Commit: `${{ github.sha }}`
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update README changelog
        run: |
          pip install requests -q
          python3 scripts/update_readme_changelog.py
          git config user.name "FredAI"
          git config user.email "fredai-bot@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No README changes to sync."
            exit 0
          fi
          # main has branch protection (PR + required "Validate" check) --
          # a direct push here was silently rejected every time (git push
          # ... || true swallowed the failure, so this step always reported
          # success even though the change never landed). Push to a
          # short-lived branch and open+auto-merge a PR instead, reusing
          # the same gh pr merge --auto pattern used throughout this
          # project's own PR-based workflow -- respects protection, no
          # bypass needed.
          BRANCH="docs/readme-sync-${{ steps.version.outputs.version }}"
          git checkout -b "$BRANCH"
          git commit -m "docs: sync README changelog to ${{ steps.version.outputs.version }}"
          git push origin "$BRANCH"
          gh pr create --title "docs: sync README changelog to ${{ steps.version.outputs.version }}" \
            --body "Automated changelog sync from the GitHub Release job." \
            --base main --head "$BRANCH"
          gh pr merge "$BRANCH" --squash --delete-branch --auto
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Deploy: notify registered instances ────────────────────────
  deploy:
    name: Deploy to Instances
    needs: docker
    runs-on: ubuntu-latest
    environment: production
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Notify instances to pull update
        run: |
          URLS="${{ secrets.FREDAI_WEBHOOK_URLS }}"
          SECRET="${{ secrets.FREDAI_DEPLOY_SECRET }}"
          SHA="${{ github.sha }}"
          if [ -z "$URLS" ]; then
            echo "No FREDAI_WEBHOOK_URLS configured — instances rely on 6h auto-poll"
            exit 0
          fi
          if [ -z "$SECRET" ]; then
            echo "FREDAI_DEPLOY_SECRET not set — skipping webhook (instances will poll)"
            exit 0
          fi
          NOTIFIED=0; FAILED=0
          IFS=',' read -ra ADDRS <<< "$URLS"
          for URL in "${ADDRS[@]}"; do
            URL=$(echo "$URL" | xargs)
            [ -z "$URL" ] && continue
            echo "Notifying: $URL"
            HTTP=$(curl -sS -o /dev/null -w "%{http_code}" \
              -X POST "$URL/api/update/apply" \
              -H "Content-Type: application/json" \
              -H "X-FredAI-Deploy: $SECRET" \
              --max-time 30 || echo "000")
            if [ "$HTTP" = "200" ] || [ "$HTTP" = "202" ]; then
              echo "  OK ($HTTP)"; NOTIFIED=$((NOTIFIED+1))
            else
              echo "  Warning: HTTP $HTTP"; FAILED=$((FAILED+1))
            fi
          done
          echo "Notified $NOTIFIED, unreachable $FAILED"

  # ── R&D + community engagement every 6h ────────────────────────
  rnd:
    name: "R&D and Community Cycle"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'ci' && github.event.inputs.mode != 'release')
    permissions:
      contents: write
      issues: write
      discussions: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt -q
      - name: Configure git
        run: |
          git config user.name "FredAI"
          git config user.email "fredai-bot@users.noreply.github.com"
      - name: Run improvement and community cycle
        # improve.py now commits + opens a PR itself (main is branch-protected,
        # direct pushes are rejected) — no separate "commit and push to main"
        # step needed here anymore.
        run: |
          MODE="${{ github.event.inputs.mode || 'improve' }}"
          case "$MODE" in
            dry-run)  python3 improve.py --dry-run ;;
            discover) python3 improve.py --discover ;;
            *)        python3 improve.py ;;
          esac
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}

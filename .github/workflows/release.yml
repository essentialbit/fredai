name: FredAI Release — Build & Publish Installers

on:
  push:
    tags:
      - "v*"          # v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # manual trigger from GitHub UI

permissions:
  contents: write
  packages: write

jobs:
  # ── Validate imports before building ────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt -q
      - run: python3 -c "from main import app; print('Import OK')"
      - run: python3 deploy/validate.py --ci

  # ── Linux / Raspberry Pi tarball ────────────────────────────────────────────
  build-linux:
    name: Linux tarball
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build release archive
        run: |
          TAG="${GITHUB_REF_NAME:-dev}"
          ARCHIVE="fredai-${TAG}-linux-x86_64.tar.gz"
          # Exclude .env (contains secrets), venv, pycache, data
          tar czf "$ARCHIVE" \
            --exclude='.env' \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            --exclude='.venv' \
            --exclude='venv' \
            --exclude='data/*.db' \
            --exclude='.git' \
            .
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: ${{ env.ARCHIVE }}

  # ── Raspberry Pi (ARM64) tarball ─────────────────────────────────────────────
  build-rpi:
    name: Raspberry Pi ARM64
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build ARM64 archive
        run: |
          TAG="${GITHUB_REF_NAME:-dev}"
          ARCHIVE="fredai-${TAG}-linux-aarch64.tar.gz"
          tar czf "$ARCHIVE" \
            --exclude='.env' --exclude='*.pyc' --exclude='__pycache__' \
            --exclude='.venv' --exclude='venv' --exclude='data/*.db' --exclude='.git' .
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64
          path: ${{ env.ARCHIVE }}

  # ── Windows installer (.bat + .ps1 bundled into .zip) ───────────────────────
  build-windows:
    name: Windows installer
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install PyInstaller
        run: pip install pyinstaller -q
      - name: Build Windows installer EXE (bootstrapper)
        run: python deploy/build_exe.py
      - name: Build Windows ZIP
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          if (-not $TAG) { $TAG = "dev" }
          $outFile = "fredai-$TAG-windows.zip"
          $exclude = @('.env','*.pyc','__pycache__','.venv','venv','data\*.db','.git')
          Compress-Archive -Path (Get-ChildItem -Exclude $exclude) -DestinationPath $outFile
          Write-Host "Created $outFile"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            fredai-*.zip
            dist\FredAI-Setup.exe

  # ── Docker image (all platforms via buildx) ──────────────────────────────────
  build-docker:
    name: Docker multi-arch
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ghcr.io/essentialbit/fredai:latest
            ghcr.io/essentialbit/fredai:${{ github.ref_name }}

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build-linux, build-rpi, build-windows, build-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          generate_release_notes: true
          files: artifacts/**/*
          body: |
            ## FredAI ${{ github.ref_name }}

            ### Quick Install

            **Linux / macOS / Raspberry Pi:**
            ```bash
            curl -sSL https://raw.githubusercontent.com/essentialbit/fredai/main/deploy/install.sh | bash
            ```

            **Windows 10/11:**
            1. Download `fredai-*-windows.zip`
            2. Extract and double-click `deploy\install.bat`

            **Docker (any platform):**
            ```bash
            docker run -d -p 8080:8080 --env-file .env ghcr.io/essentialbit/fredai:latest
            ```

            **iOS / Android:**
            After installing on a server, open `http://your-server:8080` in Safari/Chrome
            and tap **"Add to Home Screen"** for a native-app experience.

            ### Platform Matrix
            | Platform | Method | Notes |
            |----------|--------|-------|
            | Windows 10/11 | `install.bat` (double-click) | Auto-installs Python + Ollama |
            | Linux (x86) | `install.sh` | Auto-detects distro |
            | Raspberry Pi 4+ | `install.sh` | ARM64 native |
            | Raspberry Pi Zero | `install.sh` | Lite mode, API-only AI |
            | macOS | `install.sh` | Homebrew-aware |
            | Docker | `docker run` | Multi-arch image |
            | iOS | Browser → Add to Home Screen | PWA, no App Store needed |
            | Android | Browser → Add to Home Screen | PWA, or install APK |

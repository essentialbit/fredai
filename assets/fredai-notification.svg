<!-- FredAI Notification/Badge Icon — minimal, works at 20x20 and up -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4ff"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
  </defs>
  <!-- Hexagon background -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18" fill="#040c17" stroke="url(#ng)" stroke-width="3"/>
  <!-- F -->
  <text x="32" y="34" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#00ff88">F</text>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#03080f">
<title>FredAI — Intelligence Graph</title>
<link rel="icon" href="/static/icons/favicon.ico" sizes="any">
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://d3js.org/topojson.v3.min.js"></script>
<style>
:root{
  --bg:#03080f;--bg1:#07111c;--bg2:#0d1a2a;
  --green:#00ff88;--red:#ff3b5c;--blue:#00b4ff;--purple:#9b59ff;--gold:#f5a623;
  --t1:#e8f4ff;--t2:#8ba3b8;--t3:#4a6380;
  --border:rgba(0,180,255,.12);
  --sans:'Inter','SF Pro Display',-apple-system,sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--sans);overflow:hidden}

/* ── TOP BAR ── */
#top-bar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;gap:12px;padding:10px 16px;
  background:rgba(3,8,15,.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.brand{font-size:15px;font-weight:800;letter-spacing:2px;color:var(--blue)}
.brand span{color:var(--green)}
#back-btn{padding:4px 12px;background:rgba(0,180,255,.1);border:1px solid rgba(0,180,255,.25);border-radius:6px;color:var(--blue);font-size:11px;cursor:pointer;font-family:var(--sans)}
#back-btn:hover{background:rgba(0,180,255,.2)}
.view-toggle{display:flex;gap:4px;margin-left:auto}
.vt-btn{
  padding:5px 14px;background:none;border:1px solid var(--border);
  border-radius:6px;color:var(--t2);font-size:11px;cursor:pointer;font-family:var(--sans);
  transition:.15s;
}
.vt-btn.active{background:rgba(0,180,255,.15);border-color:var(--blue);color:var(--blue)}
#node-count{font-size:10px;color:var(--t3)}
#legend-toggle{padding:4px 10px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--t3);font-size:10px;cursor:pointer;font-family:var(--sans)}

/* ── MAIN CANVAS ── */
#graph-view, #map-view{
  position:fixed;top:42px;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 50% 30%,rgba(0,180,255,.04) 0%,var(--bg) 60%);
}
#map-view{display:none}

svg#graph-svg, svg#map-svg{width:100%;height:100%}

/* Grid lines */
#graph-svg .grid-line{stroke:rgba(0,180,255,.04);stroke-width:1}

/* Nodes */
.node-circle{
  stroke-width:1.5;cursor:pointer;transition:filter .2s;
}
.node-circle:hover{filter:brightness(1.4)}
.node-label{
  font-size:9px;font-family:var(--mono);font-weight:700;
  fill:rgba(232,244,255,.8);pointer-events:none;
  text-shadow:0 0 6px rgba(0,0,0,.8);
}
.node-price{
  font-size:7px;font-family:var(--mono);
  fill:rgba(139,163,184,.7);pointer-events:none;
}

/* Links */
.link-line{stroke-opacity:.4;stroke-width:1;transition:stroke-opacity .2s}
.link-line:hover{stroke-opacity:.9}
.link-line.highlighted{stroke-opacity:.9;stroke-width:2}

/* Pulse animation for nodes */
@keyframes node-pulse{
  0%{transform:scale(1);opacity:.6}
  50%{transform:scale(1.5);opacity:0}
  100%{transform:scale(1);opacity:0}
}
.node-glow{animation:node-pulse 2.5s ease-out infinite;transform-origin:center}

/* ── INFO PANEL ── */
#info-panel{
  position:fixed;right:16px;top:58px;width:280px;
  background:rgba(7,17,28,.95);backdrop-filter:blur(16px);
  border:1px solid var(--border);border-radius:12px;
  overflow:hidden;display:none;z-index:150;
}
#info-panel.visible{display:block}
#ip-header{
  padding:12px 14px 8px;
  background:linear-gradient(135deg,rgba(0,180,255,.08),rgba(155,89,255,.08));
  border-bottom:1px solid var(--border);
}
#ip-sym{font-size:20px;font-weight:800;font-family:var(--mono);color:var(--t1)}
#ip-name{font-size:10px;color:var(--t3);margin-top:2px}
#ip-location{font-size:9px;color:var(--t3);margin-top:3px}
#ip-price-row{display:flex;align-items:baseline;gap:8px;margin-top:6px}
#ip-price{font-size:15px;font-family:var(--mono);font-weight:700;color:var(--t1)}
#ip-chg{font-size:11px;font-family:var(--mono);font-weight:700}
#ip-body{padding:10px 14px;max-height:400px;overflow-y:auto}
.ip-section{margin-bottom:10px}
.ip-lbl{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--t3);text-transform:uppercase;margin-bottom:5px}
#ip-sector{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700}
#ip-assessment{margin-top:10px}
.assess-signal{
  display:inline-block;padding:4px 12px;border-radius:20px;
  font-size:11px;font-weight:800;letter-spacing:1px;margin-bottom:6px;
}
.assess-signal.BUY{background:rgba(0,255,136,.15);color:var(--green);border:1px solid rgba(0,255,136,.3)}
.assess-signal.SELL{background:rgba(255,59,92,.15);color:var(--red);border:1px solid rgba(255,59,92,.3)}
.assess-signal.HOLD{background:rgba(245,166,35,.15);color:var(--gold);border:1px solid rgba(245,166,35,.3)}
.assess-signal.WATCH{background:rgba(0,180,255,.15);color:var(--blue);border:1px solid rgba(0,180,255,.3)}
.assess-conviction{font-size:9px;color:var(--t3);margin-left:6px}
.assess-rat{font-size:10px;color:var(--t2);line-height:1.5;margin-bottom:8px}
.assess-case{font-size:9px;line-height:1.5;margin-bottom:3px}
.assess-case.bull{color:var(--green)}
.assess-case.bear{color:var(--red)}
.assess-disclaimer{font-size:8px;color:var(--t3);font-style:italic;margin-top:8px}
.assess-loading{color:var(--t3);font-size:10px;padding:10px 0}

#ip-relations{max-height:120px;overflow-y:auto}
.ip-rel{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:9px;border-bottom:1px solid rgba(255,255,255,.04)}
.ip-rel:last-child{border-bottom:none}
.ip-rel-type{padding:1px 5px;border-radius:3px;font-weight:700;font-size:8px;flex-shrink:0}
.ip-rel-desc{color:var(--t2);line-height:1.4}

#close-info{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px}
#close-info:hover{color:var(--t1)}

/* ── LEGEND ── */
#legend{
  position:fixed;left:16px;bottom:16px;
  background:rgba(7,17,28,.9);backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:10px;padding:10px 14px;
  display:none;z-index:150;max-width:200px;
}
#legend.visible{display:block}
.legend-item{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:9px;color:var(--t2)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-line{width:20px;height:2px;border-radius:1px;flex-shrink:0}
.legend-section-title{font-size:8px;font-weight:700;letter-spacing:1px;color:var(--t3);text-transform:uppercase;margin-top:6px;margin-bottom:3px}

/* ── SEARCH ── */
#graph-search{
  position:fixed;left:50%;transform:translateX(-50%);top:54px;
  background:rgba(7,17,28,.9);backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:20px;
  padding:5px 12px;font-size:11px;color:var(--t1);
  width:200px;outline:none;font-family:var(--sans);
  transition:width .2s;z-index:150;
}
#graph-search:focus{width:280px;border-color:rgba(0,180,255,.4)}
#graph-search::placeholder{color:var(--t3)}

/* ── WORLD MAP ── */
.graticule{fill:none;stroke:rgba(0,180,255,.08);stroke-width:.5}
.sphere{fill:rgba(0,15,30,.8)}
.land{fill:rgba(0,40,70,.6);stroke:rgba(0,180,255,.15);stroke-width:.5}
.country-highlight{fill:rgba(0,180,255,.12);stroke:rgba(0,180,255,.3);stroke-width:1}
.map-node{cursor:pointer}
.map-node circle{transition:r .2s,filter .2s}
.map-node circle:hover{filter:brightness(1.5)}
.map-pulse{pointer-events:none;animation:map-pulse-anim 2s ease-out infinite}
@keyframes map-pulse-anim{
  0%{r:6;opacity:.8}
  100%{r:20;opacity:0}
}
.map-label{font-family:var(--mono);font-size:8px;fill:rgba(232,244,255,.7);pointer-events:none}
.map-price{font-family:var(--mono);font-size:7px;fill:rgba(139,163,184,.6);pointer-events:none}

/* Controls */
#map-controls{
  position:fixed;left:16px;top:58px;z-index:150;
  background:rgba(7,17,28,.85);border:1px solid var(--border);
  border-radius:10px;padding:10px;
}
.mc-btn{
  display:block;width:32px;height:32px;background:none;
  border:1px solid var(--border);border-radius:6px;
  color:var(--t2);font-size:14px;cursor:pointer;margin-bottom:4px;
  font-family:var(--sans);text-align:center;line-height:30px;
  transition:.15s;
}
.mc-btn:hover{border-color:var(--blue);color:var(--blue)}

/* Loading overlay */
#graph-loading{
  position:fixed;inset:0;top:42px;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  z-index:100;
}
.g-spin{width:32px;height:32px;border:3px solid rgba(0,180,255,.2);border-top-color:var(--blue);border-radius:50%;animation:rot .8s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.g-load-text{color:var(--t3);font-size:13px;letter-spacing:1px}
</style>
</head>
<body>

<div id="top-bar">
  <button id="back-btn" onclick="history.back()">← Dashboard</button>
  <div class="brand">Fred<span>AI</span></div>
  <span style="font-size:11px;color:var(--t2)">Intelligence Graph</span>
  <span id="node-count" style="font-size:10px;color:var(--t3)"></span>
  <div class="view-toggle">
    <button class="vt-btn active" onclick="setView('graph',this)">◈ Relationship Graph</button>
    <button class="vt-btn" onclick="setView('map',this)">🌐 World Map</button>
  </div>
  <button id="legend-toggle" onclick="toggleLegend()">Legend</button>
</div>

<input id="graph-search" placeholder="Search stocks..." oninput="searchGraph(this.value)">

<div id="graph-loading">
  <div class="g-spin"></div>
  <div class="g-load-text">Building intelligence graph...</div>
</div>

<!-- Force-directed relationship graph -->
<div id="graph-view">
  <svg id="graph-svg"></svg>
</div>

<!-- World map -->
<div id="map-view">
  <div id="map-controls">
    <button class="mc-btn" onclick="zoomMap(1.3)" title="Zoom in">+</button>
    <button class="mc-btn" onclick="zoomMap(0.75)" title="Zoom out">−</button>
    <button class="mc-btn" onclick="resetMap()" title="Reset">⟳</button>
  </div>
  <svg id="map-svg"></svg>
</div>

<!-- Node info panel -->
<div id="info-panel">
  <button id="close-info" onclick="closeInfo()">✕</button>
  <div id="ip-header">
    <div id="ip-sym">--</div>
    <div id="ip-name">--</div>
    <div id="ip-location">--</div>
    <div id="ip-price-row">
      <span id="ip-price">$--</span>
      <span id="ip-chg">--%</span>
    </div>
  </div>
  <div id="ip-body">
    <div class="ip-section">
      <div class="ip-lbl">Sector</div>
      <span id="ip-sector">--</span>
    </div>
    <div class="ip-section" id="ip-relations-wrap">
      <div class="ip-lbl">Relationships</div>
      <div id="ip-relations"></div>
    </div>
    <div id="ip-assessment">
      <div class="ip-lbl">Fred's Assessment</div>
      <div class="assess-loading" id="assess-loading">Asking Fred...</div>
      <div id="assess-content" style="display:none"></div>
    </div>
  </div>
</div>

<!-- Legend -->
<div id="legend">
  <div class="legend-section-title">Sectors</div>
  <div id="legend-sectors"></div>
  <div class="legend-section-title">Relationships</div>
  <div id="legend-edges"></div>
</div>

<script>
let graphData = null;
let simulation = null;
let svgGraph = null;
let svgMap = null;
let currentView = 'graph';
let selectedNode = null;
let mapZoom = null;
let graphZoom = null;
const W = window.innerWidth, H = window.innerHeight - 42;

// ── DATA LOAD ────────────────────────────────────────────────────────────────
async function loadGraph() {
  try {
    const r = await fetch('/api/graph');
    graphData = await r.json();
    document.getElementById('node-count').textContent =
      `${graphData.node_count} companies · ${graphData.edge_count} connections`;
    buildLegend();
    initGraph();
    initMap();
    document.getElementById('graph-loading').style.display = 'none';
  } catch(e) {
    document.getElementById('graph-loading').innerHTML =
      '<span style="color:var(--t3)">Failed to load graph data.</span>';
    console.error(e);
  }
}

// ── FORCE-DIRECTED GRAPH ─────────────────────────────────────────────────────
function initGraph() {
  const svg = d3.select('#graph-svg');
  svgGraph = svg;
  const width = W, height = H;
  // viewBox ties the SVG's internal coordinate system (computed once from W/H
  // at load) to whatever box it's actually rendered into — without this, the
  // force layout renders off-center/clipped/stretched on any window resize
  // or differing viewport, since the CSS width:100%/height:100% stretches
  // the box but nothing reconciles the coordinates inside it.
  svg.attr('viewBox', `0 0 ${width} ${height}`).attr('preserveAspectRatio', 'xMidYMid meet');

  // Background grid
  const defs = svg.append('defs');
  const grid = defs.append('pattern')
    .attr('id','grid').attr('width',40).attr('height',40)
    .attr('patternUnits','userSpaceOnUse');
  grid.append('path').attr('d','M 40 0 L 0 0 0 40').attr('fill','none')
    .attr('stroke','rgba(0,180,255,0.04)').attr('stroke-width',1);
  svg.append('rect').attr('width',width).attr('height',height).attr('fill','url(#grid)');

  // Arrow markers for directed edges
  const edgeTypes = Object.keys(graphData.edge_colors || {});
  edgeTypes.forEach(type => {
    const color = graphData.edge_colors[type] || '#4a6380';
    defs.append('marker')
      .attr('id','arrow-'+type).attr('viewBox','0 -5 10 10')
      .attr('refX',18).attr('refY',0).attr('markerWidth',6).attr('markerHeight',6)
      .attr('orient','auto')
      .append('path').attr('d','M0,-5L10,0L0,5').attr('fill',color).attr('opacity',.6);
  });

  const g = svg.append('g').attr('id','graph-g');

  // Zoom
  graphZoom = d3.zoom().scaleExtent([.1,4]).on('zoom', e => {
    g.attr('transform', e.transform);
  });
  svg.call(graphZoom);

  // Build simulation
  simulation = d3.forceSimulation(graphData.nodes)
    .force('link', d3.forceLink(graphData.edges)
      .id(d => d.id).distance(d => 80 + (10 - d.strength) * 15))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(width/2, height/2))
    .force('collision', d3.forceCollide().radius(d => d.size + 8))
    .force('x', d3.forceX(width/2).strength(.05))
    .force('y', d3.forceY(height/2).strength(.05));

  // Sector clustering
  const sectors = [...new Set(graphData.nodes.map(n => n.sector))];
  const sectorCenters = {};
  sectors.forEach((s, i) => {
    const angle = (i / sectors.length) * 2 * Math.PI;
    sectorCenters[s] = { x: width/2 + Math.cos(angle)*220, y: height/2 + Math.sin(angle)*180 };
  });
  simulation.force('cluster', alpha => {
    graphData.nodes.forEach(d => {
      const center = sectorCenters[d.sector];
      if (!center) return;
      d.vx += (center.x - d.x) * alpha * 0.04;
      d.vy += (center.y - d.y) * alpha * 0.04;
    });
  });

  // Draw links
  const link = g.append('g').selectAll('line')
    .data(graphData.edges).enter().append('line')
    .attr('class','link-line')
    .attr('stroke', d => d.color || '#4a6380')
    .attr('stroke-width', d => Math.max(.5, d.strength * .2))
    .attr('marker-end', d => `url(#arrow-${d.type || 'partner'})`)
    .on('mouseover', function(event, d) {
      d3.select(this).attr('stroke-opacity',.9).attr('stroke-width',2);
      showTooltip(event, `${d.source.id || d.source} → ${d.target.id || d.target}: ${d.description || ''}`);
    })
    .on('mouseout', function() {
      d3.select(this).attr('stroke-opacity',.4).attr('stroke-width', d => Math.max(.5, d.strength*.2));
      hideTooltip();
    });

  // Draw nodes
  const node = g.append('g').selectAll('g.node-g')
    .data(graphData.nodes).enter().append('g')
    .attr('class','node-g')
    .attr('id', d => 'node-'+d.id)
    .call(d3.drag()
      .on('start', dragStart)
      .on('drag', dragged)
      .on('end', dragEnd))
    .on('click', (event, d) => showNodeInfo(d, graphData.edges));

  // Outer glow pulse
  node.append('circle')
    .attr('class','node-glow')
    .attr('r', d => d.size + 4)
    .attr('fill', d => d.color + '22')
    .attr('stroke', d => d.color + '44')
    .attr('stroke-width', 1);

  // Main circle
  node.append('circle')
    .attr('class','node-circle')
    .attr('r', d => d.size)
    .attr('fill', d => d.color + '33')
    .attr('stroke', d => d.color)
    .attr('stroke-width', 1.5);

  // Label
  node.append('text')
    .attr('class','node-label')
    .attr('dy', d => -d.size - 4)
    .attr('text-anchor','middle')
    .text(d => d.symbol);

  // Price
  node.append('text')
    .attr('class','node-price')
    .attr('dy', d => d.size + 12)
    .attr('text-anchor','middle')
    .text(d => d.price > 0 ? '$'+d.price.toFixed(0) : '');

  simulation.on('tick', () => {
    link
      .attr('x1', d => (d.source.x||0))
      .attr('y1', d => (d.source.y||0))
      .attr('x2', d => (d.target.x||0))
      .attr('y2', d => (d.target.y||0));
    node.attr('transform', d => `translate(${d.x||0},${d.y||0})`);
  });
}

function dragStart(event, d) {
  if (!event.active) simulation.alphaTarget(.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnd(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// ── WORLD MAP ────────────────────────────────────────────────────────────────
function initMap() {
  const svg = d3.select('#map-svg');
  svgMap = svg;
  svg.attr('viewBox', `0 0 ${W} ${H}`).attr('preserveAspectRatio', 'xMidYMid meet');
  const projection = d3.geoNaturalEarth1()
    .scale(W / 6.5)
    .translate([W/2, H/2]);
  const path = d3.geoPath().projection(projection);

  mapZoom = d3.zoom().scaleExtent([.5,8]).on('zoom', e => {
    mapG.attr('transform', e.transform);
  });
  svg.call(mapZoom);

  const mapG = svg.append('g').attr('id','map-g');

  // Sphere + graticule
  mapG.append('path').datum({type:'Sphere'}).attr('class','sphere').attr('d',path);
  mapG.append('path').datum(d3.geoGraticule()()).attr('class','graticule').attr('d',path);

  // Load world topo
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(r => r.json())
    .then(world => {
      mapG.append('g').selectAll('path')
        .data(topojson.feature(world, world.objects.countries).features)
        .enter().append('path')
        .attr('class','land')
        .attr('d',path);
    }).catch(() => {});

  // Company nodes
  const mapNodes = graphData.nodes.filter(n => n.lat && n.lng && !(n.lat===0 && n.lng===0));

  const nodeG = mapG.append('g').selectAll('.map-node')
    .data(mapNodes).enter().append('g')
    .attr('class','map-node')
    .attr('transform', d => {
      const [x,y] = projection([d.lng, d.lat]) || [0,0];
      return `translate(${x},${y})`;
    })
    .on('click', (event, d) => showNodeInfo(d, graphData.edges));

  // Pulse ring
  nodeG.append('circle')
    .attr('class','map-pulse')
    .attr('r', 6)
    .attr('fill', 'none')
    .attr('stroke', d => d.color)
    .attr('stroke-width', 1)
    .style('animation-delay', (d,i) => (i*0.15)+'s');

  // Main dot
  nodeG.append('circle')
    .attr('r', d => Math.max(4, Math.min(12, 4 + (d.price||0)**0.2)))
    .attr('fill', d => d.color + '88')
    .attr('stroke', d => d.color)
    .attr('stroke-width', 1);

  // Label
  nodeG.append('text')
    .attr('class','map-label')
    .attr('dy', -8).attr('text-anchor','middle')
    .text(d => d.symbol);

  // Price
  nodeG.append('text')
    .attr('class','map-price')
    .attr('dy', 16).attr('text-anchor','middle')
    .text(d => d.price > 0 ? '$'+d.price.toFixed(0) : '');
}

function zoomMap(factor) {
  svgMap.transition().duration(300).call(mapZoom.scaleBy, factor);
}
function resetMap() {
  svgMap.transition().duration(400).call(mapZoom.transform, d3.zoomIdentity);
}

// ── NODE INFO PANEL ──────────────────────────────────────────────────────────
function showNodeInfo(node, edges) {
  selectedNode = node;
  const panel = document.getElementById('info-panel');
  panel.classList.add('visible');

  document.getElementById('ip-sym').textContent = node.symbol;
  document.getElementById('ip-name').textContent = node.name || node.symbol;
  document.getElementById('ip-location').textContent = node.city
    ? `📍 ${node.city}, ${node.country}`
    : '';

  const price = node.price || 0;
  const chg = node.change_pct || 0;
  document.getElementById('ip-price').textContent = price > 0 ? '$'+price.toFixed(2) : '--';
  const chgEl = document.getElementById('ip-chg');
  chgEl.textContent = (chg >= 0 ? '+' : '') + chg.toFixed(2) + '%';
  chgEl.style.color = chg >= 0 ? 'var(--green)' : 'var(--red)';

  const sectEl = document.getElementById('ip-sector');
  sectEl.textContent = node.sector || 'Unknown';
  sectEl.style.background = (node.color || '#4a6380') + '22';
  sectEl.style.color = node.color || '#4a6380';
  sectEl.style.border = `1px solid ${node.color || '#4a6380'}44`;

  // Relationships
  const rels = edges.filter(e => {
    const src = e.source.id || e.source;
    const tgt = e.target.id || e.target;
    return src === node.symbol || tgt === node.symbol;
  });
  const relEl = document.getElementById('ip-relations');
  if (rels.length) {
    relEl.innerHTML = rels.slice(0,8).map(e => {
      const other = (e.source.id||e.source) === node.symbol ? (e.target.id||e.target) : (e.source.id||e.source);
      const col = e.color || '#4a6380';
      return `<div class="ip-rel">
        <span class="ip-rel-type" style="background:${col}22;color:${col};border:1px solid ${col}44">${e.type||''}</span>
        <div><strong>${other}</strong><div class="ip-rel-desc">${e.description||''}</div></div>
      </div>`;
    }).join('');
  } else {
    relEl.innerHTML = '<div style="color:var(--t3);font-size:9px">No mapped relationships.</div>';
  }

  // Highlight this node in graph
  if (currentView === 'graph') {
    d3.selectAll('.node-circle').attr('stroke-width', d => d.symbol===node.symbol ? 3 : 1.5)
      .attr('stroke-opacity', d => d.symbol===node.symbol ? 1 : .7);
    d3.selectAll('.link-line')
      .attr('stroke-opacity', e => {
        const s=e.source.id||e.source, t=e.target.id||e.target;
        return (s===node.symbol||t===node.symbol) ? .9 : .15;
      });
  }

  // Load assessment
  loadAssessment(node.symbol);
}

async function loadAssessment(symbol) {
  document.getElementById('assess-loading').style.display = 'block';
  document.getElementById('assess-content').style.display = 'none';
  try {
    const r = await fetch('/api/assessment/' + symbol);
    const d = await r.json();
    renderAssessment(d);
  } catch(e) {
    document.getElementById('assess-loading').textContent = 'Assessment unavailable.';
  }
}

function renderAssessment(d) {
  const loading = document.getElementById('assess-loading');
  const content = document.getElementById('assess-content');
  loading.style.display = 'none';
  content.style.display = 'block';
  const signal = d.signal || 'WATCH';
  const cats = d.key_catalysts || [];
  content.innerHTML = `
    <span class="assess-signal ${signal}">${signal}</span>
    <span class="assess-conviction">${d.conviction||''} conviction · ${d.time_horizon||''}</span>
    <div class="assess-rat">${esc(d.rationale||'')}</div>
    <div class="assess-case bull">▲ ${esc(d.bull_case||'')}</div>
    <div class="assess-case bear">▼ ${esc(d.bear_case||'')}</div>
    ${cats.length ? `<div style="margin-top:6px;font-size:9px;color:var(--t3)">Catalysts: ${cats.map(c=>`<span style="color:var(--blue)">${esc(c)}</span>`).join(' · ')}</div>` : ''}
    <div class="assess-disclaimer">${esc(d.disclaimer||'Not financial advice — informational only.')}</div>
    <div style="font-size:8px;color:var(--t3);margin-top:4px">${d.generated_at||''}</div>
  `;
}

function closeInfo() {
  document.getElementById('info-panel').classList.remove('visible');
  d3.selectAll('.node-circle').attr('stroke-width',1.5).attr('stroke-opacity',1);
  d3.selectAll('.link-line').attr('stroke-opacity',.4);
}

// ── SEARCH ───────────────────────────────────────────────────────────────────
function searchGraph(query) {
  const q = query.trim().toUpperCase();
  if (!q) {
    d3.selectAll('.node-circle').attr('stroke-width',1.5).attr('stroke-opacity',1);
    d3.selectAll('.node-label').attr('opacity',1);
    return;
  }
  d3.selectAll('.node-g').each(function(d) {
    const match = d.symbol.includes(q) || d.name.toUpperCase().includes(q) || d.sector.toUpperCase().includes(q);
    d3.select(this).selectAll('circle').attr('stroke-opacity', match?1:.2);
    d3.select(this).selectAll('text').attr('opacity', match?1:.2);
    if (match && d.x) {
      const transform = d3.zoomIdentity.translate(W/2 - d.x*1.5, H/2 - d.y*1.5).scale(1.5);
      svgGraph.transition().duration(600).call(graphZoom.transform, transform);
    }
  });
}

// ── VIEW TOGGLE ──────────────────────────────────────────────────────────────
function setView(view, btn) {
  currentView = view;
  document.querySelectorAll('.vt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('graph-view').style.display = view==='graph' ? '' : 'none';
  document.getElementById('map-view').style.display = view==='map' ? '' : 'none';
}

// ── LEGEND ───────────────────────────────────────────────────────────────────
function buildLegend() {
  const sEl = document.getElementById('legend-sectors');
  const eEl = document.getElementById('legend-edges');
  if (graphData.sector_colors) {
    sEl.innerHTML = Object.entries(graphData.sector_colors).map(([s,c])=>
      `<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${s}</div>`
    ).join('');
  }
  if (graphData.edge_colors) {
    eEl.innerHTML = Object.entries(graphData.edge_colors).map(([t,c])=>
      `<div class="legend-item"><div class="legend-line" style="background:${c}"></div>${t}</div>`
    ).join('');
  }
}
function toggleLegend() {
  document.getElementById('legend').classList.toggle('visible');
}

// ── TOOLTIP ──────────────────────────────────────────────────────────────────
let tooltip = null;
function showTooltip(event, text) {
  if (!tooltip) {
    tooltip = document.createElement('div');
    tooltip.style.cssText = 'position:fixed;background:rgba(7,17,28,.95);border:1px solid rgba(0,180,255,.2);border-radius:6px;padding:5px 10px;font-size:10px;color:#8ba3b8;z-index:500;pointer-events:none;max-width:200px;line-height:1.4';
    document.body.appendChild(tooltip);
  }
  tooltip.textContent = text;
  tooltip.style.left = (event.clientX + 10) + 'px';
  tooltip.style.top = (event.clientY - 20) + 'px';
  tooltip.style.display = 'block';
}
function hideTooltip() { if (tooltip) tooltip.style.display='none'; }

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ── INIT ─────────────────────────────────────────────────────────────────────
loadGraph();
</script>
</body>
</html>

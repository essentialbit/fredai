<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#03080f">
<title>FredAI — News</title>
<link rel="icon" href="/static/icons/favicon.ico" sizes="any">
<style>
:root{
  --bg:#03080f;--bg1:#07111c;--bg2:#0d1a2a;
  --green:#00ff88;--red:#ff3b5c;--blue:#00b4ff;--purple:#9b59ff;--gold:#f5a623;
  --t1:#e8f4ff;--t2:#8ba3b8;--t3:#4a6380;
  --border:rgba(0,180,255,.12);
  --font-xs:11px;--font-sm:13px;--font-md:15px;
  --mono:'JetBrains Mono','Fira Code',monospace;
  --sans:'Inter','SF Pro Display',-apple-system,BlinkMacSystemFont,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--sans);font-size:var(--font-sm)}
a{color:inherit;text-decoration:none}

/* ── LAYOUT ── */
#shell{display:flex;flex-direction:column;min-height:100vh}
#top-bar{
  display:flex;align-items:center;gap:12px;
  padding:10px 20px;border-bottom:1px solid var(--border);
  background:rgba(7,17,28,.9);backdrop-filter:blur(10px);
  position:sticky;top:0;z-index:100;
}
.brand{font-size:16px;font-weight:800;letter-spacing:2px;color:var(--blue)}
.brand span{color:var(--green)}
#back-btn{
  padding:4px 12px;background:rgba(0,180,255,.1);border:1px solid rgba(0,180,255,.25);
  border-radius:6px;color:var(--blue);font-size:var(--font-xs);cursor:pointer;
  font-family:var(--sans);letter-spacing:.5px;
}
#back-btn:hover{background:rgba(0,180,255,.2)}
#top-bar h1{font-size:var(--font-sm);font-weight:700;letter-spacing:1px;color:var(--t1)}
.badge{
  font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 7px;
  border-radius:20px;background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.25);
  color:var(--green);text-transform:uppercase;
}

#main-layout{display:flex;flex:1;gap:0;overflow:hidden}

/* ── SIDEBAR ── */
#sidebar{
  width:240px;flex-shrink:0;border-right:1px solid var(--border);
  background:var(--bg1);padding:16px;overflow-y:auto;
}
.filter-section{margin-bottom:20px}
.filter-label{
  font-size:9px;font-weight:700;letter-spacing:2px;color:var(--t3);
  text-transform:uppercase;margin-bottom:8px;
}
.filter-btn{
  display:block;width:100%;text-align:left;padding:7px 10px;
  background:none;border:none;color:var(--t2);font-size:var(--font-xs);
  cursor:pointer;border-radius:6px;margin-bottom:2px;font-family:var(--sans);
  transition:.15s;
}
.filter-btn:hover,.filter-btn.active{background:rgba(0,180,255,.1);color:var(--blue)}
.filter-btn.active{font-weight:600;border-left:2px solid var(--blue)}

#ticker-filter-wrap{position:relative}
#ticker-input{
  width:100%;padding:7px 10px;background:var(--bg2);
  border:1px solid var(--border);border-radius:6px;
  color:var(--t1);font-size:var(--font-xs);outline:none;font-family:var(--sans);
}
#ticker-input:focus{border-color:rgba(0,180,255,.4)}
#ticker-clear{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--t3);cursor:pointer;font-size:12px;
}

.time-pill{
  display:inline-block;padding:4px 10px;border-radius:20px;font-size:9px;
  font-weight:700;letter-spacing:.5px;cursor:pointer;margin-right:4px;margin-bottom:4px;
  border:1px solid var(--border);color:var(--t2);background:none;font-family:var(--sans);
}
.time-pill.active,.time-pill:hover{border-color:var(--blue);color:var(--blue);background:rgba(0,180,255,.1)}

/* Source tags */
.source-tag{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 8px;border-radius:5px;font-size:10px;cursor:pointer;
  transition:.15s;margin-bottom:2px;
}
.source-tag:hover,.source-tag.active{background:rgba(255,255,255,.05)}
.source-tag input[type=checkbox]{accent-color:var(--blue)}

/* ── FEED ── */
#feed-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:0}
#feed-header{
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
  flex-wrap:wrap;
}
#result-count{font-size:10px;color:var(--t3)}
#search-box{
  flex:1;min-width:200px;padding:7px 12px;background:var(--bg1);
  border:1px solid var(--border);border-radius:8px;
  color:var(--t1);font-size:var(--font-xs);outline:none;font-family:var(--sans);
}
#search-box:focus{border-color:rgba(0,180,255,.4)}
#refresh-btn{
  padding:6px 14px;background:rgba(0,180,255,.1);border:1px solid rgba(0,180,255,.25);
  border-radius:6px;color:var(--blue);font-size:var(--font-xs);cursor:pointer;
  font-family:var(--sans);white-space:nowrap;
}
#refresh-btn:hover{background:rgba(0,180,255,.2)}

/* News card */
.news-card{
  display:flex;gap:12px;padding:14px;border-bottom:1px solid rgba(255,255,255,.04);
  transition:background .15s;cursor:pointer;
}
.news-card:hover{background:rgba(255,255,255,.025)}
.news-card:last-child{border-bottom:none}

.nc-left{flex:1;min-width:0}
.nc-meta{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.nc-source{
  font-size:9px;font-weight:700;letter-spacing:.5px;
  padding:2px 7px;border-radius:20px;text-transform:uppercase;
}
.nc-source.market{color:var(--blue);background:rgba(0,180,255,.1);border:1px solid rgba(0,180,255,.2)}
.nc-source.central_bank{color:var(--gold);background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.2)}
.nc-source.macro{color:var(--purple);background:rgba(155,89,255,.1);border:1px solid rgba(155,89,255,.2)}
.nc-source.geopolitical{color:var(--red);background:rgba(255,59,92,.1);border:1px solid rgba(255,59,92,.2)}
.nc-source.ai{color:var(--green);background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.2)}
.nc-source.ticker{color:var(--t2);background:rgba(255,255,255,.05);border:1px solid var(--border)}
.nc-source.australia{color:#f5a623;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.2)}

.nc-tickers{display:flex;gap:4px;flex-wrap:wrap}
.nc-ticker{
  font-size:8px;font-weight:700;font-family:var(--mono);
  padding:1px 5px;border-radius:3px;background:rgba(0,180,255,.08);
  border:1px solid rgba(0,180,255,.15);color:var(--blue);
}
.nc-title{font-size:var(--font-sm);font-weight:600;color:var(--t1);line-height:1.4;margin-bottom:5px}
.nc-title a:hover{color:var(--blue)}
.nc-summary{font-size:10px;color:var(--t2);line-height:1.55;margin-bottom:6px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.nc-footer{display:flex;align-items:center;gap:8px}
.nc-time{font-size:9px;color:var(--t3)}
.nc-src-name{font-size:9px;color:var(--t3)}
.nc-sent{font-size:10px;font-family:var(--mono);font-weight:700}
.nc-sent.pos{color:var(--green)}
.nc-sent.neg{color:var(--red)}
.nc-sent.neu{color:var(--t3)}

.nc-right{
  width:60px;flex-shrink:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.nc-sent-bar{
  width:4px;border-radius:2px;
  background:linear-gradient(to top, var(--red) 0%, var(--t3) 50%, var(--green) 100%);
  height:40px;position:relative;
}
.nc-sent-dot{
  position:absolute;left:50%;transform:translateX(-50%);
  width:8px;height:8px;border-radius:50%;
  border:1px solid var(--bg);
}

/* Pagination */
#pagination{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:20px;border-top:1px solid var(--border);
}
.page-btn{
  padding:5px 12px;background:var(--bg1);border:1px solid var(--border);
  border-radius:6px;color:var(--t2);font-size:var(--font-xs);cursor:pointer;font-family:var(--sans);
}
.page-btn:hover{border-color:var(--blue);color:var(--blue)}
.page-btn.active{background:rgba(0,180,255,.15);border-color:var(--blue);color:var(--blue)}
.page-btn:disabled{opacity:.4;cursor:default}
#page-info{font-size:10px;color:var(--t3)}

/* Loading */
#feed-loading{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:60px;color:var(--t3);
}
.spin{width:16px;height:16px;border:2px solid rgba(0,180,255,.2);border-top-color:var(--blue);border-radius:50%;animation:rot .8s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
#feed-empty{padding:60px;text-align:center;color:var(--t3);display:none}

/* Disclaimer footer */
#disc-bar{
  padding:6px 16px;background:rgba(245,166,35,.05);border-top:1px solid rgba(245,166,35,.15);
  font-size:9px;color:var(--t3);text-align:center;
}
</style>
</head>
<body>
<div id="shell">

  <div id="top-bar">
    <button id="back-btn" onclick="history.back()">← Dashboard</button>
    <div class="brand">Fred<span>AI</span></div>
    <h1>Financial Intelligence Feed</h1>
    <span class="badge" id="total-badge">Loading...</span>
  </div>

  <div id="main-layout">

    <!-- ── SIDEBAR FILTERS ── -->
    <div id="sidebar">

      <div class="filter-section">
        <div class="filter-label">Category</div>
        <button class="filter-btn active" data-cat="all" onclick="setCategory(this,'all')">All News</button>
        <button class="filter-btn" data-cat="market" onclick="setCategory(this,'market')">Markets</button>
        <button class="filter-btn" data-cat="ai" onclick="setCategory(this,'ai')">AI & Tech</button>
        <button class="filter-btn" data-cat="central_bank" onclick="setCategory(this,'central_bank')">Central Banks</button>
        <button class="filter-btn" data-cat="macro" onclick="setCategory(this,'macro')">Macro & Economy</button>
        <button class="filter-btn" data-cat="geopolitical" onclick="setCategory(this,'geopolitical')">Geopolitical</button>
        <button class="filter-btn" data-cat="australia" onclick="setCategory(this,'australia')">Australia</button>
        <button class="filter-btn" data-cat="ticker" onclick="setCategory(this,'ticker')">Ticker-Specific</button>
      </div>

      <div class="filter-section">
        <div class="filter-label">Time Window</div>
        <button class="time-pill active" onclick="setHours(this,4)">4h</button>
        <button class="time-pill" onclick="setHours(this,12)">12h</button>
        <button class="time-pill" onclick="setHours(this,24)">24h</button>
        <button class="time-pill" onclick="setHours(this,72)">3d</button>
        <button class="time-pill" onclick="setHours(this,168)">7d</button>
      </div>

      <div class="filter-section">
        <div class="filter-label">Filter by Ticker</div>
        <div id="ticker-filter-wrap">
          <input id="ticker-input" placeholder="e.g. NVDA" oninput="setTicker(this.value)">
          <button id="ticker-clear" onclick="clearTicker()">✕</button>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-label">Sentiment</div>
        <button class="filter-btn" onclick="setSentiment('all')">All</button>
        <button class="filter-btn" onclick="setSentiment('bullish')">Bullish only</button>
        <button class="filter-btn" onclick="setSentiment('bearish')">Bearish only</button>
        <button class="filter-btn" onclick="setSentiment('neutral')">Neutral only</button>
      </div>

    </div><!-- /sidebar -->

    <!-- ── MAIN FEED ── -->
    <div id="feed-area">

      <div id="feed-header">
        <input id="search-box" placeholder="Search headlines..." oninput="onSearch(this.value)">
        <button id="refresh-btn" onclick="loadNews(1,true)">↻ Refresh</button>
        <span id="result-count"></span>
      </div>

      <div id="feed-loading"><div class="spin"></div>Loading news...</div>
      <div id="feed-empty">No articles found for current filters.</div>
      <div id="news-feed"></div>
      <div id="pagination"></div>

    </div><!-- /feed-area -->

  </div><!-- /main-layout -->

  <div id="disc-bar">
    Financial news aggregated from public sources for informational purposes only. Not financial advice. All investment risk is yours.
  </div>
</div><!-- /shell -->

<script>
let _cat = 'all', _hours = 24, _ticker = '', _sentiment = 'all', _page = 1, _search = '';
let _searchTimer = null;
let _totalItems = 0;

function setCategory(btn, cat) {
  document.querySelectorAll('.filter-btn[data-cat]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  _cat = cat; _page = 1; loadNews(1);
}
function setHours(btn, h) {
  document.querySelectorAll('.time-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  _hours = h; _page = 1; loadNews(1);
}
function setTicker(val) { _ticker = val.trim().toUpperCase(); _page = 1; loadNews(1); }
function clearTicker() { document.getElementById('ticker-input').value=''; setTicker(''); }
function setSentiment(s) { _sentiment = s; _page = 1; loadNews(1); }
function onSearch(val) {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(()=>{ _search = val.trim(); _page = 1; loadNews(1); }, 350);
}

async function loadNews(page=1, forceRefresh=false) {
  _page = page;
  const loading = document.getElementById('feed-loading');
  const feed = document.getElementById('news-feed');
  const empty = document.getElementById('feed-empty');
  loading.style.display = 'flex';
  feed.innerHTML = '';
  empty.style.display = 'none';

  const params = new URLSearchParams({
    category: _cat, hours: _hours, page, limit: 30,
    ticker: _ticker,
  });

  try {
    const r = await fetch('/api/news?' + params);
    const d = await r.json();
    _totalItems = d.total || 0;
    document.getElementById('total-badge').textContent = _totalItems + ' articles';
    document.getElementById('result-count').textContent = `${_totalItems} results`;
    loading.style.display = 'none';

    let items = d.items || [];

    // Client-side search filter
    if (_search) {
      const q = _search.toLowerCase();
      items = items.filter(i => (i.title||'').toLowerCase().includes(q) ||
                                (i.summary||'').toLowerCase().includes(q));
    }

    // Client-side sentiment filter
    if (_sentiment !== 'all') {
      items = items.filter(i => {
        const s = i.sentiment_score || 0;
        if (_sentiment === 'bullish') return s > 0.1;
        if (_sentiment === 'bearish') return s < -0.1;
        return s >= -0.1 && s <= 0.1;
      });
    }

    if (!items.length) { empty.style.display = 'block'; return; }

    feed.innerHTML = items.map(item => renderCard(item)).join('');
    renderPagination(d.total, page, 30);
  } catch(e) {
    loading.innerHTML = '<span style="color:var(--t3)">Failed to load news — retrying...</span>';
    console.error(e);
  }
}

function renderCard(item) {
  const sent = item.sentiment_score || 0;
  const sentClass = sent > 0.1 ? 'pos' : sent < -0.1 ? 'neg' : 'neu';
  const sentText = sent > 0.1 ? `▲ ${sent.toFixed(2)}` : sent < -0.1 ? `▼ ${sent.toFixed(2)}` : `— ${sent.toFixed(2)}`;

  const cat = esc(item.category || 'market');
  const tickers = (item.tickers || '').split(',').filter(Boolean);
  const tickerTags = tickers.map(t => `<span class="nc-ticker">${esc(t)}</span>`).join('');
  const pub = formatDate(item.published_at);
  const dotColor = sent > 0.1 ? '#00ff88' : sent < -0.1 ? '#ff3b5c' : '#4a6380';
  const dotPos = Math.round(50 - sent * 40);

  return `
  <div class="news-card" onclick="openArticle('${esc(item.url)}')">
    <div class="nc-left">
      <div class="nc-meta">
        <span class="nc-source ${cat}">${esc(item.category||'market')}</span>
        <span class="nc-src-name">${esc(item.source||'')}</span>
        ${tickerTags}
      </div>
      <div class="nc-title"><a href="${esc(item.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(item.title)}</a></div>
      <div class="nc-summary">${esc(item.summary||'')}</div>
      <div class="nc-footer">
        <span class="nc-time">${pub}</span>
        <span class="nc-sent ${sentClass}">${sentText}</span>
      </div>
    </div>
    <div class="nc-right">
      <div class="nc-sent-bar">
        <div class="nc-sent-dot" style="top:${dotPos}%;background:${dotColor}"></div>
      </div>
    </div>
  </div>`;
}

function openArticle(url) {
  if (url) window.open(url, '_blank', 'noopener,noreferrer');
}

function renderPagination(total, page, limit) {
  const pages = Math.ceil(total / limit);
  if (pages <= 1) { document.getElementById('pagination').innerHTML=''; return; }
  const el = document.getElementById('pagination');
  let html = `<button class="page-btn" onclick="loadNews(${page-1})" ${page===1?'disabled':''}>← Prev</button>`;
  const start = Math.max(1, page-2), end = Math.min(pages, page+2);
  for (let p = start; p <= end; p++) {
    html += `<button class="page-btn ${p===page?'active':''}" onclick="loadNews(${p})">${p}</button>`;
  }
  html += `<button class="page-btn" onclick="loadNews(${page+1})" ${page>=pages?'disabled':''}>Next →</button>`;
  html += `<span id="page-info">${page} / ${pages}</span>`;
  el.innerHTML = html;
}

function formatDate(dt) {
  if (!dt) return '';
  try {
    const d = new Date(dt + (dt.includes('Z')?'':' UTC'));
    const diff = Math.round((Date.now() - d.getTime()) / 60000);
    if (diff < 1) return 'just now';
    if (diff < 60) return diff + 'm ago';
    if (diff < 1440) return Math.round(diff/60) + 'h ago';
    return Math.round(diff/1440) + 'd ago';
  } catch { return dt; }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// Load on start
loadNews(1);
</script>
</body>
</html>
